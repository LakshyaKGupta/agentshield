# AgentShield container and runner system configuration properties
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentshield
      POSTGRES_USER: agentshield
      POSTGRES_PASSWORD: agentshield_dev_password
    ports:
      - "5432:5432"
    volumes:
      - agentshield-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentshield -d agentshield"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_VERSION: "0.1.0"
      DEMO_MODE: "false"
      DATABASE_URL: postgresql://agentshield:agentshield_dev_password@postgres:5432/agentshield
      REDIS_URL: redis://redis:6379/0
      API_KEY_PEPPER: change-me-32-byte-random-production-secret
      JWT_ISSUER: http://localhost:8000
      JWT_AUDIENCE: agentshield-agents
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      FRONTEND_URL: http://localhost:5173
    ports:
      - "8000:8000"

volumes:
  agentshield-postgres:
