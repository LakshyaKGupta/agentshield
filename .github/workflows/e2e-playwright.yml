name: E2E Playwright Headless Visual Regressions

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: agentshield
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: super-secure-db-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest httpx certifi boto3 redis alembic

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 19
        cache: 'npm'
        cache-dependency-path: frontend/package.json

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Install Playwright Browsers & System Dependencies
      run: |
        cd frontend
        npx playwright install --with-deps

    - name: Run Alembic migrations
      env:
        DATABASE_URL: postgresql://postgres:super-secure-db-password@localhost:5432/agentshield
      run: |
        cd backend
        alembic upgrade head

    - name: Build frontend static assets
      run: |
        cd frontend
        npm run build

    - name: Start FastAPI backend in background
      env:
        DATABASE_URL: postgresql://postgres:super-secure-db-password@localhost:5432/agentshield
        REDIS_URL: redis://localhost:6379/0
        SECRETS_PROVIDER: local
        DEMO_MODE: "true"
        ALLOW_UNVERIFIED_FIREBASE_AUTH: "true"
        API_KEY_PEPPER: a3885850e2a08c89857435f11d92346c
      run: |
        python -m uvicorn backend.app.main:app --host 127.0.0.1 --port 8000 &
        echo "Waiting for backend to be ready..."
        until curl -s http://127.0.0.1:8000/health; do sleep 1; done
        echo "Backend is live!"

    - name: Start Vite dev server in background
      env:
        VITE_API_URL: http://127.0.0.1:8000
      run: |
        cd frontend
        npm run dev -- --port 5173 &
        echo "Waiting for frontend to be ready..."
        until curl -s http://127.0.0.1:5173; do sleep 1; done
        echo "Frontend is live!"

    - name: Run Headless Playwright E2E & Visual tests
      env:
        VITE_API_URL: http://127.0.0.1:8000
      run: |
        cd frontend
        npm run test:e2e

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30
