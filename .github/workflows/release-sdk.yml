name: Release AgentShield Python SDK to PyPI

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+' # Trigger on semantic version tags (e.g. v1.0.0)

permissions:
  contents: read

jobs:
  test:
    name: Run Verification Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Development and SDK Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest build cryptography pydantic fastapi httpx

      - name: Execute Test Suite
        env:
          DEMO_MODE: "true"
        run: |
          PYTHONPATH=backend:sdk/python python -m unittest discover -s tests -v

  build:
    name: Compile Python Wheels
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Build CLI Tool
        run: python -m pip install build --user

      - name: Build Tarball and Wheel Distributions
        run: |
          cd sdk/python
          python -m build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-packages
          path: sdk/python/dist/
          retention-days: 2

  publish:
    name: Secure Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agentshield
    permissions:
      id-token: write  # MANDATORY for PyPI Trusted Publishing OIDC authentication
      contents: read
    steps:
      - name: Retrieve Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist-packages
          path: dist/

      - name: Publish Package to PyPI via Trusted Publishing OIDC
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true
          print-hash: true
