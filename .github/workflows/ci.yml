name: AgentShield CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'codex/**'

permissions:
  contents: read

jobs:
  backend:
    name: Backend contracts and tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: agentshield_test
          POSTGRES_USER: agentshield
          POSTGRES_PASSWORD: agentshield
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentshield -d agentshield_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Compile Python sources
        run: python -m compileall backend scripts tests
      - name: Run unit tests
        env:
          DEMO_MODE: "true"
        run: python -m unittest discover -s tests -v
      - name: Validate production environment shape
        env:
          DEMO_MODE: "false"
          DATABASE_URL: postgresql://agentshield:agentshield@127.0.0.1:5432/agentshield_test
          REDIS_URL: redis://127.0.0.1:6379/0
          API_KEY_PEPPER: ci-random-looking-secret-at-least-32-chars
          JWT_ISSUER: https://api.ci.agentshield.local
          JWT_AUDIENCE: agentshield-agents
          ALLOWED_ORIGINS: https://app.ci.agentshield.local
          KMS_KEY_ARN: arn:aws:kms:us-east-1:000000000000:key/ci-placeholder
        run: python scripts/check_production_env.py
      - name: Export OpenAPI
        run: python scripts/export_openapi.py

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  docker:
    name: Container build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: agentshield:ci
