apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: default
data:
  DATABASE_URL: "postgresql://postgres@pgbouncer:6432/agentshield"
  REDIS_URL: "redis://redis:6379/0"
  SECRETS_PROVIDER: "local"
  DEMO_MODE: "false"
  FIREBASE_PROJECT_ID: "agentshield-prod"
  ALLOW_UNVERIFIED_FIREBASE_AUTH: "false"
---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: default
type: Opaque
data:
  # Base64 encoded placeholders. Replace in real CD pipeline (e.g. ArgoCD, KMS Vault injection)
  database-password: c3VwZXItc2VjdXJlLWRiLXBhc3N3b3Jk # "super-secure-db-password"
  api-key-pepper: YTM4ODU4NTBlMmEwOGM4OTg1NzQzNWYxMWQ5MjM0NmM= # custom pepper base64
  key-encryption-key: a2V5LWVuY3J5cHRpb24ta2V5LXByb2QtNDg= # custom encryption key base64
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: default
  labels:
    app: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: agentshield:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: api-config
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: database-password
            - name: API_KEY_PEPPER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: api-key-pepper
            - name: KEY_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: key-encryption-key
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
            requests:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: default
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
