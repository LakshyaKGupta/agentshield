apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentshield-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
    - host: app.agentshield.com
      http:
        paths:
          # Match /api/v1/chat or any backend route and route to the api service
          - path: /api(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          # Route all other client-side traffic
          - path: /(.*)
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
  tls:
    - hosts:
        - app.agentshield.com
      secretName: agentshield-tls-secret
